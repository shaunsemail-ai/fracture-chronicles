<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="screen-orientation" content="landscape">
  <title>Fracture Chronicles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #050508;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Courier New', monospace;
    }
    #canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #ui-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #d4c89a;
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: #050508;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #d4c89a;
      font-family: 'Courier New', monospace;
      text-align: center;
      gap: 18px;
    }
    #rotate-prompt .icon { font-size: 52px; }
    #rotate-prompt .msg  { font-size: 15px; letter-spacing: 2px; color: #7a6e52; }
    @media (orientation: portrait) {
      #rotate-prompt { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <div class="icon">&#8635;</div>
    <div style="font-size:17px; letter-spacing:3px;">ROTATE DEVICE</div>
    <div class="msg">Fracture Chronicles plays in landscape</div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="ui-overlay"></div>
  <div id="loading">Loading...</div>

  <script src="js/palette.js"></script>
  <script src="js/input.js"></script>
  <script src="js/save.js"></script>
  <script src="js/items.js"></script>
  <script src="js/world.js"></script>
  <script src="js/story.js"></script>
  <script src="js/quests.js"></script>
  <script src="js/player.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/pets.js"></script>
  <script src="js/crafting.js"></script>
  <script src="js/merchant.js"></script>
  <script src="js/config.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/curriculum.js"></script>
  <script src="js/engine.js"></script>
</body>
</html>
